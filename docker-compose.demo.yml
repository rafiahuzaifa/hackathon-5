version: '3.9'

# =================================================================
# TechCorp FTE — DEMO Mode Docker Compose
# Minimal setup: PostgreSQL + Backend (DRY_RUN=true) + Frontend
# NO Kafka, NO Gmail, NO Twilio needed!
# Usage: docker-compose -f docker-compose.demo.yml up --build
# =================================================================

services:
  # ---------------------------------------------------------------
  # PostgreSQL (only for ticket storage — optional in pure demo)
  # ---------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fte-demo-postgres
    environment:
      POSTGRES_USER: fte_user
      POSTGRES_PASSWORD: demopassword
      POSTGRES_DB: fte_db
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fte_user -d fte_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - fte-demo-network

  # ---------------------------------------------------------------
  # FastAPI Backend — DEMO MODE
  # DRY_RUN=true: Uses in-memory Kafka, mock channel responses
  # ---------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fte-demo-backend
    environment:
      # === DEMO MODE SETTINGS ===
      DRY_RUN: "true"
      LOG_LEVEL: INFO

      # === REQUIRED ===
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # === DATABASE (optional — gracefully skipped if unavailable) ===
      DATABASE_URL: postgresql://fte_user:demopassword@postgres:5432/fte_db

      # === EXTERNAL APIs (not needed in demo mode) ===
      GMAIL_CLIENT_ID: ""
      GMAIL_CLIENT_SECRET: ""
      GMAIL_REFRESH_TOKEN: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_WHATSAPP_NUMBER: ""

      # === CORS ===
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - fte-demo-network

  # ---------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fte-demo-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: "TechCorp AI Support (Demo)"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fte-demo-network

# ---------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------
volumes:
  demo_postgres_data:
    driver: local

# ---------------------------------------------------------------
# Networks
# ---------------------------------------------------------------
networks:
  fte-demo-network:
    driver: bridge
