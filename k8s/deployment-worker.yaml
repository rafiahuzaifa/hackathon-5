apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-worker
  namespace: customer-success-fte
  labels:
    app: fte-worker
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fte-worker
  template:
    metadata:
      labels:
        app: fte-worker
        component: worker
    spec:
      containers:
        - name: worker
          image: techcorp/fte-backend:latest
          command: ["python", "-m", "backend.workers.message_processor"]
          envFrom:
            - configMapRef:
                name: fte-config
            - secretRef:
                name: fte-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
