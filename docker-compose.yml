version: '3.9'

# =================================================================
# TechCorp FTE — LIVE Mode Docker Compose
# Includes: PostgreSQL, Kafka, Backend API, Worker, Frontend
# Usage: docker-compose up --build
# =================================================================

services:
  # ---------------------------------------------------------------
  # PostgreSQL 16 with pgvector
  # ---------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fte-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fte_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fte_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fte_user} -d ${POSTGRES_DB:-fte_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - fte-network

  # ---------------------------------------------------------------
  # Apache Kafka (KRaft mode — no Zookeeper)
  # ---------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.6
    container_name: fte-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - fte-network

  # ---------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fte-backend
    environment:
      DRY_RUN: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-fte_user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-fte_db}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-}
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - fte-network

  # ---------------------------------------------------------------
  # Kafka Message Processor Worker
  # ---------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fte-worker
    command: ["python", "-m", "backend.workers.message_processor"]
    environment:
      DRY_RUN: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-fte_user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-fte_db}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fte-network

  # ---------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fte-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: TechCorp AI Support
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - fte-network

# ---------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  kafka_data:
    driver: local

# ---------------------------------------------------------------
# Networks
# ---------------------------------------------------------------
networks:
  fte-network:
    driver: bridge
